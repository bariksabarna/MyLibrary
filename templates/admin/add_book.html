{% extends 'base.html' %}
{% block title %}Add Book — MyLibrary{% endblock %}
{% block content %}
<div class="page-container">
  <a href="{{ url_for('admin_books') }}" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Books</a>
  <div class="page-header"><h1><i class="fa-solid fa-plus"></i> Add New Book</h1></div>
  <div class="glass-card form-card" style="max-width:700px;">
    <form method="POST" action="{{ url_for('admin_add_book') }}" enctype="multipart/form-data" class="book-form">

      <!-- Cover Upload -->
      <div class="cover-upload-area" id="coverUploadArea" onclick="document.getElementById('coverInput').click()">
        <div id="coverPreview" class="cover-preview-empty">
          <i class="fa-solid fa-cloud-arrow-up"></i>
          <p>Click to upload book cover</p>
          <small>Auto-converts to AVIF · Uploaded to Cloudinary</small>
        </div>
        <img id="coverImg" src="" alt="" style="display:none;width:100%;height:100%;object-fit:cover;border-radius:12px;">
        <input type="file" id="coverInput" name="cover_image" accept="image/*" style="display:none;" onchange="previewCover(this)">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label><i class="fa-solid fa-book"></i> Book Title *</label>
          <input type="text" name="title" placeholder="Enter book title" value="{{ form_data.get('title','') }}" required>
        </div>
        <div class="form-group">
          <label><i class="fa-solid fa-user-pen"></i> Author</label>
          <input type="text" name="author" placeholder="Author name" value="{{ form_data.get('author','') }}">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label><i class="fa-solid fa-graduation-cap"></i> Trade / Branch</label>
          <input type="text" name="trade" placeholder="e.g. Computer Science, Electronics" value="{{ form_data.get('trade','') }}">
        </div>
        <div class="form-group">
          <label><i class="fa-solid fa-layer-group"></i> Semester</label>
          <select name="semester">
            <option value="">Not Applicable</option>
            {% for s in ['1','2','3','4','5','6'] %}
            <option value="{{ s }}" {% if form_data.get('semester')==s %}selected{% endif %}>Semester {{ s }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="form-group">
        <label><i class="fa-solid fa-align-left"></i> Description</label>
        <textarea name="description" placeholder="Brief description of the book..." rows="3">{{ form_data.get('description','') }}</textarea>
      </div>

      <div class="form-group">
        <label><i class="fa-solid fa-copy"></i> Total Copies</label>
        <input type="number" name="total_quantity" min="1" value="{{ form_data.get('total_quantity','1') }}" style="max-width:160px;">
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-primary btn-lg"><i class="fa-solid fa-plus"></i> Add Book</button>
        <a href="{{ url_for('admin_books') }}" class="btn-outline btn-lg">Cancel</a>
      </div>
    </form>
  </div>
</div>

<style>
.cover-upload-area {
  width:100%; height:200px; border:2px dashed rgba(99,102,241,0.3);
  border-radius:14px; cursor:pointer; overflow:hidden; position:relative;
  background:rgba(99,102,241,0.04); transition:all 0.2s; margin-bottom:8px;
}
.cover-upload-area:hover { border-color:rgba(99,102,241,0.6); background:rgba(99,102,241,0.08); }
.cover-preview-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:8px; color:var(--text-muted); }
.cover-preview-empty i { font-size:2.5rem; color:rgba(99,102,241,0.5); }
.cover-preview-empty p { font-weight:700; color:var(--text); }
.cover-preview-empty small { font-size:0.75rem; color:rgba(99,102,241,0.7); }
</style>

<script>
function previewCover(input) {
  if (!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('coverImg').src = e.target.result;
    document.getElementById('coverImg').style.display = 'block';
    document.getElementById('coverPreview').style.display = 'none';
  };
  reader.readAsDataURL(input.files[0]);
}
</script>
{% endblock %}
