{% extends 'base_auth.html' %}
{% block title %}Login - MyLibrary{% endblock %}
{% block content %}
<div class="auth-card">
  <div class="auth-card-header">
    <h2>Welcome Back</h2>
    <p>Sign in to your library account</p>
  </div>
  <form method="POST" action="{{ url_for('login') }}" class="auth-form">
    <div class="form-group">
      <label><i class="fa-solid fa-envelope"></i> Email Address</label>
      <input type="email" name="email" placeholder="your@email.com" required autocomplete="email">
    </div>
    <div class="form-group">
      <label><i class="fa-solid fa-lock"></i> Password</label>
      <div class="input-icon-r">
        <input type="password" name="password" id="loginPass" placeholder="Enter your password" required autocomplete="current-password">
        <button type="button" class="eye-btn" onclick="togglePass('loginPass',this)"><i class="fa-solid fa-eye"></i></button>
      </div>
    </div>
    <div class="form-options">
      <a href="{{ url_for('forgot_password') }}" class="link-muted">Forgot password?</a>
    </div>
    <button type="submit" class="btn-auth"><i class="fa-solid fa-right-to-bracket"></i> Sign In</button>
  </form>
  <div class="auth-footer">
    <p>Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
  </div>
</div>
{% endblock %}
