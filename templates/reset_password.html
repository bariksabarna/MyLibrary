{% extends 'base_auth.html' %}
{% block title %}Reset Password - MyLibrary{% endblock %}
{% block content %}
<div class="auth-card">
  <div class="auth-card-header">
    <div class="otp-icon"><i class="fa-solid fa-lock-open"></i></div>
    <h2>Reset Password</h2>
    <p>Enter your new password</p>
  </div>
  <form method="POST" class="auth-form">
    <div class="form-group">
      <label><i class="fa-solid fa-lock"></i> New Password</label>
      <div class="input-icon-r">
        <input type="password" name="password" id="p1" placeholder="Min 8 chars, A-Z, 0-9, !@#" required>
        <button type="button" class="eye-btn" onclick="togglePass('p1',this)"><i class="fa-solid fa-eye"></i></button>
      </div>
    </div>
    <div class="form-group">
      <label><i class="fa-solid fa-lock-open"></i> Confirm Password</label>
      <div class="input-icon-r">
        <input type="password" name="confirm_password" id="p2" placeholder="Repeat password" required>
        <button type="button" class="eye-btn" onclick="togglePass('p2',this)"><i class="fa-solid fa-eye"></i></button>
      </div>
    </div>
    <button type="submit" class="btn-auth"><i class="fa-solid fa-check"></i> Reset Password</button>
  </form>
</div>
{% endblock %}
