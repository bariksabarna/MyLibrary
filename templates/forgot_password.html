{% extends 'base_auth.html' %}
{% block title %}Forgot Password - MyLibrary{% endblock %}
{% block content %}
<div class="auth-card">
  <div class="auth-card-header">
    <div class="otp-icon"><i class="fa-solid fa-key"></i></div>
    <h2>Forgot Password</h2>
    <p>Enter your email to receive a reset code</p>
  </div>
  <form method="POST" class="auth-form">
    <div class="form-group">
      <label><i class="fa-solid fa-envelope"></i> Email Address</label>
      <input type="email" name="email" placeholder="your@email.com" required>
    </div>
    <button type="submit" class="btn-auth"><i class="fa-solid fa-paper-plane"></i> Send Reset OTP</button>
  </form>
  <div class="auth-footer">
    <p>Remember your password? <a href="{{ url_for('login') }}">Sign in</a></p>
  </div>
</div>
{% endblock %}
